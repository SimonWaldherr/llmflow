api:
  provider: lmstudio
  base_url: http://localhost:1234/v1
  model: local-model
  timeout: 120s
  max_output_tokens: 800

prompt:
  system: |
    You extract structured information from short texts.
  input_template: |
    Extract the key attributes from this record:

    {{ toPrettyJSON .record }}

  post_prompt: |
    Return a JSON object with the most important fields.

input:
  type: csv
  path: ./examples/input.csv
  csv:
    delimiter: ","
    has_header: true

output:
  type: jsonl
  path: ./examples/output-lmstudio.jsonl

processing:
  include_input_in_output: true
  response_field: lmstudio_response
  continue_on_error: true
  workers: 1
