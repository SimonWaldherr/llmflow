api:
  provider: openai
  api_key_env: OPENAI_API_KEY
  model: gpt-5.4-mini
  timeout: 60s
  max_output_tokens: 700

prompt:
  system: |
    You normalize structured records.
  input_template: |
    JSON entry:
    {{ toPrettyJSON .record }}

  post_prompt: |
    Return a compact JSON object.

input:
  type: json
  path: ./examples/input.json

output:
  type: jsonl
  path: ./examples/output-json-input.jsonl

processing:
  include_input_in_output: true
  response_field: json_input_response
  continue_on_error: true
  workers: 2
