api:
  provider: openai
  api_key_env: OPENAI_API_KEY
  model: gpt-5.4-mini
  timeout: 60s
  max_output_tokens: 700

prompt:
  system: |
    Du transformierst XML-Datensätze in sauberes JSON.
  input_template: |
    XML-Datensatz als Map:
    {{ toPrettyJSON .record }}

  post_prompt: |
    Antworte nur mit JSON.

input:
  type: xml
  path: ./examples/input.xml
  xml:
    record_path: record

output:
  type: jsonl
  path: ./examples/output-xml-input.jsonl

processing:
  include_input_in_output: true
  response_field: xml_input_response
  continue_on_error: true
  workers: 2
