api:
  provider: generic
  base_url: https://your-openai-compatible-endpoint.example/v1
  api_key_env: GENERIC_LLM_API_KEY
  model: your-model-name
  timeout: 60s
  max_output_tokens: 800

prompt:
  system: |
    You work deterministically and return only structured results.
  input_template: |
    Transform this record:

    {{ toPrettyJSON .record }}

  post_prompt: |
    Respond with JSON only.

input:
  type: csv
  path: ./examples/input.csv
  csv:
    delimiter: ","
    has_header: true

output:
  type: jsonl
  path: ./examples/output-generic.jsonl

processing:
  include_input_in_output: true
  response_field: generic_response
  continue_on_error: true
  workers: 2
