api:
  provider: openai
  base_url: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY
  model: gpt-5.4-mini
  timeout: 60s
  max_output_tokens: 1000
  rate_limit_rpm: 60

prompt:
  system: |
    You are a precise data-transformation assistant.
  pre_prompt: |
    Analyze the following record.
  input_template: |
    Source: {{ .source }}
    Record:
    {{ toPrettyJSON .record }}
  post_prompt: |
    Return only a compact JSON object.

input:
  type: csv
  path: ./examples/input.csv
  csv:
    delimiter: ","
    has_header: true

output:
  type: jsonl
  path: ./examples/output.jsonl

processing:
  mode: per_record
  include_input_in_output: true
  response_field: llm_response
  continue_on_error: true
  workers: 2
  dry_run: false
